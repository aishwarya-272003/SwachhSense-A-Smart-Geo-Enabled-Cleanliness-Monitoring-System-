{% extends "staff/base.html" %}
{% block title %}Add Staff{% endblock %}
{% block page_title %}➕ <span data-i18n="nav_add_staff">Add Staff</span>{% endblock %}
{% block content %}
<div class="card" style="max-width:560px;">
  <div class="card-header" data-i18n="add_staff_header">Add New Staff Member</div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group"><label data-i18n="field_full_name">Full Name *</label><input type="text" name="name" required placeholder="Enter full name"></div>
      <div class="form-group"><label data-i18n="th_username">Username *</label><input type="text" name="username" required placeholder="e.g. admin_blg"></div>
      <div class="form-group"><label data-i18n="login_password">Password *</label><input type="password" name="password" required placeholder="Min 6 characters"></div>
      <div class="form-group">
        <label data-i18n="th_city">City</label>
        <select name="city">
          <option value="" data-i18n="all_cities">-- All Cities --</option>
          {% for city in supported_cities %}<option value="{{ city.lower() }}">{{ city }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="th_role">Role</label>
        <select name="role">
          <option value="inspector" data-i18n="role_inspector">Inspector</option>
          <option value="supervisor" data-i18n="role_supervisor">Supervisor</option>
          <option value="admin" data-i18n="role_admin">Admin</option>
        </select>
      </div>
      <div class="form-group"><label data-i18n="th_phone">Phone</label><input type="tel" name="phone" placeholder="10-digit phone number"></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="email@example.com"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;" data-i18n="add_staff_btn">Add Staff Member</button>
    </form>
  </div>
</div>
{% endblock %}
